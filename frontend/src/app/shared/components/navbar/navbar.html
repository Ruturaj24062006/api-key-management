<header class="navbar-header">
  <div class="container navbar-container">
    <div class="logo">
      <a routerLink="/">NEXUS</a>
    </div>
    
    <nav class="nav-links">
      <a routerLink="/" fragment="product" class="nav-link">Product</a>
      <a routerLink="/" fragment="how-it-works" class="nav-link">How It Works</a>
      <a routerLink="/" fragment="pricing" class="nav-link">Pricing</a>
      
      <!-- Unauthenticated Login Link -->
      <a *ngIf="!isLoggedIn()" routerLink="/login" class="nav-link">Log In</a>
      <!-- Authenticated Logout Link -->
      <a *ngIf="isLoggedIn()" (click)="onLogout()" class="nav-link logout-anchor">Log Out</a>
    </nav>
    
    <div class="nav-actions">
      <!-- Notification Dropdown -->
      <div class="notification-bell-container" *ngIf="isLoggedIn()">
        <button type="button" class="bell-btn" (click)="toggleNotifications($event)">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="20"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" /></svg>
          <span class="bell-badge" *ngIf="unreadCount() > 0">{{ unreadCount() }}</span>
        </button>
        
        <!-- Alerts dropdown panel -->
        <div class="notification-dropdown glass-card animate-scale-up" *ngIf="isOpen()" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <h4>Alerts & Updates</h4>
            <button class="btn btn-ghost btn-xs" (click)="markAllAsRead()" *ngIf="unreadCount() > 0">Read All</button>
          </div>
          <div class="dropdown-body">
            <div class="empty-notifications" *ngIf="notifications().length === 0">
              <p>All quiet. No notifications yet.</p>
            </div>
            <div class="notifications-list" *ngIf="notifications().length > 0">
              <div 
                *ngFor="let n of notifications()" 
                class="notification-item"
                [class.unread-item]="n.status === 'PENDING'">
                <div class="item-header">
                  <span class="item-title">{{ n.title }}</span>
                  <span class="item-date">{{ n.createdAt | date:'shortTime' }}</span>
                </div>
                <p class="item-message">{{ n.message }}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Unauthenticated Get Started Button -->
      <a *ngIf="!isLoggedIn()" routerLink="/register" class="btn btn-primary btn-sm">Get Started</a>
      <!-- Authenticated Dashboard Button -->
      <a *ngIf="isLoggedIn()" [routerLink]="getDashboardLink()" class="btn btn-primary btn-sm">My Dashboard</a>
    </div>
  </div>
</header>
