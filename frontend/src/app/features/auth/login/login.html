<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo"><a routerLink="/">NEXUS</a></div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Log in to check your job matches and applications.</p>
    </div>

    <!-- Error Alert Box -->
    <div *ngIf="errorMessage()" class="alert alert-error">
      {{ errorMessage() }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Email Input -->
      <div class="form-group" [ngClass]="{'has-error': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="you@example.com" class="form-input" autocomplete="email">
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']" class="error-msg">Email is required</span>
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']" class="error-msg">Please enter a valid email</span>
      </div>

      <!-- Password Input -->
      <div class="form-group" [ngClass]="{'has-error': loginForm.get('password')?.touched && loginForm.get('password')?.invalid}">
        <div class="label-row">
          <label for="password" class="form-label">Password</label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot?</a>
        </div>
        <input type="password" id="password" formControlName="password" placeholder="••••••••" class="form-input" autocomplete="current-password">
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']" class="error-msg">Password is required</span>
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']" class="error-msg">Password must be at least 6 characters</span>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn btn-primary btn-block">
        <span *ngIf="!isLoading()">Log In</span>
        <span *ngIf="isLoading()" class="spinner-inline"></span>
      </button>
    </form>

    <!-- Social SSO Divider -->
    <div class="sso-divider">
      <span class="divider-text">or continue with</span>
    </div>

    <button type="button" class="btn btn-secondary btn-block btn-google" (click)="onGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
      </svg>
      <span>Google</span>
    </button>

    <div class="auth-footer">
      New to NEXUS? <a routerLink="/register" class="auth-link">Create an account</a>
    </div>
  </div>
</div>
