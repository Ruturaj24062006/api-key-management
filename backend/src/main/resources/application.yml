server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: career-match-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:careermatch}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT, Local Storage, Resend, and Supabase Configuration
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970} # Matches Supabase JWT Secret in Cloud
    accessTokenExpirationMs: 86400000 # 24 Hours
    refreshTokenExpirationMs: 604800000 # 7 Days
  upload:
    dir: ${UPLOAD_DIR:uploads}
  resend:
    apiKey: ${RESEND_API_KEY:mock-resend-key}
    from: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  anonKey: ${SUPABASE_ANON_KEY:mock-anon-key}

# Groq API Configuration
groq:
  api:
    key: ${GROQ_API_KEY:mock-groq-key}
    url: https://api.groq.com/openai/v1/chat/completions
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

# Springdoc OpenAPI Config
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
