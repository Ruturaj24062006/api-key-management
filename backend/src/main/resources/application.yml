server:
  port: ${PORT:8080}

spring:
  application:
    name: career-match-backend

  datasource:
    url: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
    username: postgres.qacuyhktzqhfqtswsrgs
    password: "atharvbhavsar%27s%20Project"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
  
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://localhost:5672}
    connection-timeout: 3000
    listener:
      simple:
        auto-startup: true
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms
          default-requeue-rejected: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

