services:
  # 1. Spring Boot Backend Web Service
  - type: web
    name: nexus-backend
    env: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/career-match-backend-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # 2. Angular Frontend Static Site
  - type: static
    name: nexus-frontend
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist/frontend/browser
    routes:
      # SPA Rewrite Rule to support Angular routing redirects
      - type: rewrite
        source: /*
        destination: /index.html
